name: redemption

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dachely
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:8080}
      GATEWAY_PORT: ${GATEWAY_PORT:-8080}
      WEB_PORT: ${WEB_PORT:-3000}
      API_PORT: ${API_PORT:-8081}
      SESSION_SECRET: ${SESSION_SECRET:-local-development-session-secret-at-least-32-chars}
      ADMIN_USERNAMES: ${ADMIN_USERNAMES:-admin,lucky}
      APP_MODE: ${APP_MODE:-api}
      DATABASE_URL: ${DATABASE_URL:-postgres://app:app@host.docker.internal:5432/app?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-local-internal-secret-at-least-32-chars}
      RAFFLE_DELIVERY_CRON_SECRET: ${RAFFLE_DELIVERY_CRON_SECRET:-local-cron-secret-at-least-32-chars}
      CRON_SECRET: ${CRON_SECRET:-local-cron-secret-at-least-32-chars}
      NEW_API_URL: ${NEW_API_URL:-}
      NEW_API_ADMIN_ACCESS_TOKEN: ${NEW_API_ADMIN_ACCESS_TOKEN:-}
      NEW_API_ADMIN_USER_ID: ${NEW_API_ADMIN_USER_ID:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_FEEDBACK_IMAGES: ${S3_BUCKET_FEEDBACK_IMAGES:-feedback-images}
      S3_BUCKET_CARD_IMAGES: ${S3_BUCKET_CARD_IMAGES:-card-images}
      FEEDBACK_MEDIA_DIR: ${FEEDBACK_MEDIA_DIR:-/data/feedback-media}
      FEEDBACK_MEDIA_PUBLIC_URL: ${FEEDBACK_MEDIA_PUBLIC_URL:-}
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - feedback-media-data:/data/feedback-media

volumes:
  feedback-media-data:
